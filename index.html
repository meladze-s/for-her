<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Экран 1: Логин -->
    <div id="screen-login" class="screen active">
        <h2>Привет! Введи кодовое слово:</h2>
        <input type="text" id="password-input" placeholder="Например, твое прозвище...">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <!-- Экран 2: Главная страница (Home) -->
    <div id="screen-menu" class="screen">
        <div class="profile-header">
            <h2>Для моей любимой Сони ❤️</h2>
            <p>Выбери то, что тебе интересно сегодня:</p>
        </div>

        <!-- Сетка с кнопками-плитками -->
        <div class="menu-grid">
            <button class="grid-item" onclick="showScreen('screen-quiz')">
                <span class="grid-icon">🎮</span>
                <span class="grid-text">Мини-Квиз</span>
            </button>

            <button class="grid-item" onclick="showScreen('screen-compliments')">
                <span class="grid-icon">✨</span>
                <span class="grid-text">Комплименты</span>
            </button>

            <button class="grid-item" onclick="showScreen('screen-timeline')">
                <span class="grid-icon">📅</span>
                <span class="grid-text">Наша история</span>
            </button>

            <button class="grid-item" onclick="showScreen('screen-reasons')">
                <span class="grid-icon">💖</span>
                <span class="grid-text">100 причин</span>
            </button>

            <button class="grid-item" onclick="showScreen('screen-gallery')">
                <span class="grid-icon">📸</span>
                <span class="grid-text">Наши фото</span>
            </button>

            <button class="grid-item" onclick="showScreen('screen-wishes')">
                <span class="grid-icon">💌</span>
                <span class="grid-text">Загадать желание</span>
            </button>
        </div>
    </div>

    <!-- Экран 3: Мини-игра -->
    <div id="screen-quiz" class="screen">
        <h2>Мини-Квиз</h2>
        <p>Кто из девочек умнее всех?</p>
        <button onclick="quizAnswer(true)">Софья</button>
        <button onclick="quizAnswer(false)">Остальные</button>
        <button class="back-btn" onclick="showScreen('screen-menu')">⬅️ Назад</button>
    </div>

    <script src="script.js"></script>
        <script>
        // Умная регистрация PWA с автообновлением
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                // Проверяем обновления на сервере каждые несколько секунд
                reg.update();
                
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                // Если найден новый кэш — принудительно перезагружаем страницу
                                window.location.reload();
                            }
                        }
                    };
                };
            });
        }
    </script>

</body>
</html>
